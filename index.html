<!DOCTYPE html>
<html lang="en">
<head>

    <style>

            max-width: 100%;

        }

    <div class="video-container">
        
        <div class="video-item">
            <h1>TOTJOBSTRIGGER</h1>
            <video width="600" height="400" controls>

            </video>
        </div>

        <div class="video-item">
            <h1>ACTIVITY LOG</h1>
            <video width="600" height="400" controls>

        </div>

    </div>

</body>
</html>
